<h2>Información de contacto</h2>
<div>
    <label>Nombre:</label>
    <input type="text" id="nombre" [(ngModel)]="contacto.nombre">
</div>
<div>
    <label>Email:</label>
    <input type="text" id="email" [(ngModel)]="contacto.email">
</div>
<hr>
<h3>Detalles de contacto</h3>
<p>Nombre: {{ contacto.nombre }} </p>
<p>Email: {{ contacto.email }}</p>

<hr>
<input type="text" id="ruta_img" [(ngModel)]="imagen_ruta">

<img src="{{ 'assets/media/img/' + imagen_ruta }}">
<br>
{{ 'assets/media/img/' + imagen_ruta }}
